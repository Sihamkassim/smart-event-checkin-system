version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: smartevent_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-smartevent}
      MYSQL_USER: ${DB_USER:-smartevent_user}
      MYSQL_PASSWORD: ${DB_PASS:-supersecret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootsecret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - smartevent_network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smartevent_backend
    restart: always
    depends_on:
      - database
    environment:
      - NODE_ENV=production
      - PORT=5000
      # Database connection (points to the 'database' service above)
      - DB_HOST=database
      - DB_USER=${DB_USER:-smartevent_user}
      - DB_PASS=${DB_PASS:-supersecret}
      - DB_NAME=${DB_NAME:-smartevent}
      - DB_PORT=3306
      # Authentication
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_change_me}
      # Client URL for email links (Use your real domain here!)
      - CLIENT_URL=${CLIENT_URL:-http://localhost}
      # SMTP Configuration for emails
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Smart Event System}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
    networks:
      - smartevent_network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: smartevent_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - smartevent_network

volumes:
  mysql_data:

networks:
  smartevent_network:
    driver: bridge
