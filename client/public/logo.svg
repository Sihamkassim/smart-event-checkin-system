<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#gradient)" />
  
  <!-- QR Code Pattern -->
  <rect x="20" y="20" width="20" height="20" rx="4" fill="white" />
  <rect x="22" y="22" width="16" height="16" rx="2" fill="url(#gradient)" />
  <rect x="26" y="26" width="8" height="8" rx="1" fill="white" />
  
  <rect x="60" y="20" width="20" height="20" rx="4" fill="white" />
  <rect x="62" y="22" width="16" height="16" rx="2" fill="url(#gradient)" />
  <rect x="66" y="26" width="8" height="8" rx="1" fill="white" />
  
  <rect x="20" y="60" width="20" height="20" rx="4" fill="white" />
  <rect x="22" y="62" width="16" height="16" rx="2" fill="url(#gradient)" />
  <rect x="26" y="66" width="8" height="8" rx="1" fill="white" />
  
  <!-- Center Scan Icon -->
  <rect x="45" y="45" width="10" height="10" rx="2" fill="white" />
  <rect x="47" y="47" width="6" height="6" rx="1" fill="url(#gradient)" />
  
  <!-- Scan Lines -->
  <rect x="48" y="35" width="4" height="8" rx="1" fill="white" opacity="0.8" />
  <rect x="48" y="57" width="4" height="8" rx="1" fill="white" opacity="0.8" />
  <rect x="35" y="48" width="8" height="4" rx="1" fill="white" opacity="0.8" />
  <rect x="57" y="48" width="8" height="4" rx="1" fill="white" opacity="0.8" />
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
